<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Produits - FSTM</title>
    <!-- Utilisation de Bootstrap pour le design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { padding: 40px; background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #0d6efd; font-weight: bold; margin-bottom: 0; }
        .header-section { border-bottom: 2px solid #dee2e6; margin-bottom: 30px; padding-bottom: 20px; }
        .btn-add { font-weight: 600; transition: all 0.3s; }
        .btn-add:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section d-flex justify-content-between align-items-center">
        <h1>Liste des Produits</h1>

        <!-- LE BOUTON D'AJOUT SE TROUVE ICI -->
        <a th:href="@{/produits/ajouter}" class="btn btn-success btn-add">
            <i class="bi bi-plus-circle"></i> Ajouter un Nouveau Produit
        </a>
    </div>

    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th class="text-center">ID</th>
            <th>Nom du Produit</th>
            <th class="text-end">Prix (DH)</th>
            <th class="text-center">Actions</th>
        </tr>
        </thead>
        <tbody>
        <!-- Boucle Thymeleaf sur la liste des produits -->
        <tr th:each="p : ${produits}">
            <td class="text-center fw-bold" th:text="${p.id}">1</td>
            <td th:text="${p.nom}">Nom du produit</td>
            <td class="text-end text-primary fw-bold">
                <span th:text="${#numbers.formatDecimal(p.prix, 1, 2)}">0.00</span> DH
            </td>
            <td class="text-center">
                <a th:href="@{'/produits/modifier/' + ${p.id}}" class="btn btn-sm btn-warning me-2">
                    <i class="bi bi-pencil"></i>
                </a>
                <a th:href="@{'/produits/supprimer/' + ${p.id}}" class="btn btn-sm btn-danger"
                   onclick="return confirm('Voulez-vous vraiment supprimer ce produit ?')">
                    <i class="bi bi-trash"></i>
                </a>
            </td>
        </tr>
        <!-- Cas où la liste est vide -->
        <tr th:if="${produits.isEmpty()}">
            <td colspan="4" class="text-center text-muted py-4">Aucun produit en stock. Cliquez sur "Ajouter" pour commencer.</td>
        </tr>
        </tbody>
    </table>

    <div class="mt-4 d-flex gap-2">
        <a href="/api/produits" class="btn btn-outline-secondary" target="_blank">
            <i class="bi bi-code-slash"></i> Voir le JSON Brut
        </a>
        <button onclick="window.location.reload();" class="btn btn-outline-primary">
            <i class="bi bi-arrow-clockwise"></i> Actualiser
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

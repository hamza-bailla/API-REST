<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Produits - FSTM</title>

    <!-- LIEN BOOTSTRAP DIRECT -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons pour les boutons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body { padding-top: 50px; background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; font-weight: bold; margin-bottom: 30px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .table-dark { background-color: #2c3e50 !important; }
        .btn-custom { transition: all 0.3s; }
        .btn-custom:hover { transform: translateY(-2px); }
        .action-btns { white-space: nowrap; }
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Inventaire des Produits</h1>
        <span class="badge bg-primary fs-6" th:text="${produits.size()} + ' produits trouvés'">0 produits</span>
    </div>

    <table class="table table-hover table-bordered align-middle">
        <thead class="table-dark text-white text-center">
        <tr>
            <th scope="col" style="width: 10%;">ID</th>
            <th scope="col" style="width: 45%;">Désignation du Produit</th>
            <th scope="col" style="width: 25%;">Prix (DH)</th>
            <th scope="col" style="width: 20%;">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${produits}">
            <td class="text-center fw-bold" th:text="${p.id}">1</td>
            <td th:text="${p.nom}">Nom du produit</td>
            <td class="text-end text-success fw-bold">
                <span th:text="${#numbers.formatDecimal(p.prix, 1, 2)}">0.00</span> DH
            </td>
            <td class="text-center action-btns">
                <!-- Bouton Modifier -->
                <a th:href="@{/produits/modifier/{id}(id=${p.id})}" class="btn btn-sm btn-warning">
                    <i class="bi bi-pencil-square"></i> Modifier
                </a>
                <!-- Bouton Supprimer -->
                <a th:href="@{/produits/supprimer/{id}(id=${p.id})}" class="btn btn-sm btn-danger"
                   onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce produit ?')">
                    <i class="bi bi-trash"></i>
                </a>
            </td>
        </tr>
        <tr th:if="${produits.isEmpty()}">
            <td colspan="4" class="text-center text-muted py-4">Aucun produit disponible en base de données.</td>
        </tr>
        </tbody>
    </table>

    <div class="mt-4 d-flex gap-2">
        <a href="/api/produits" class="btn btn-outline-info btn-custom" target="_blank">
            <i class="bi bi-code-slash"></i> Accéder au JSON
        </a>
        <button onclick="window.location.reload();" class="btn btn-primary btn-custom">
            <i class="bi bi-arrow-clockwise"></i> Actualiser la page
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier le Produit - FSTM</title>
    <!-- Bootstrap via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { padding-top: 50px; background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2 { color: #2c3e50; font-weight: bold; margin-bottom: 30px; border-bottom: 2px solid #f1c40f; padding-bottom: 10px; }
        .btn-update { background-color: #f1c40f; border: none; color: #2c3e50; font-weight: bold; }
        .btn-update:hover { background-color: #d4ac0d; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2><i class="bi bi-pencil-square"></i> Modifier le Produit</h2>

        <!-- Formulaire lié à l'objet "produit" envoyé par le contrôleur -->
        <form th:action="@{/produits/update}" th:object="${produit}" method="post">

            <!-- Champ caché pour l'ID (indispensable pour l'update) -->
            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
                <label for="nom" class="form-label">Désignation du Produit</label>
                <input type="text" class="form-control" id="nom" th:field="*{nom}" required placeholder="Ex: MacBook Pro">
            </div>

            <div class="mb-3">
                <label for="prix" class="form-label">Prix (DH)</label>
                <div class="input-group">
                    <input type="number" step="0.01" class="form-control" id="prix" th:field="*{prix}" required placeholder="0.00">
                    <span class="input-group-text">DH</span>
                </div>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a href="/produits-web" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Annuler
                </a>
                <button type="submit" class="btn btn-update px-4">
                    <i class="bi bi-check-lg"></i> Enregistrer les modifications
                </button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

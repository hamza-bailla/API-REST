<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Produit - FSTM</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body {
            padding-top: 50px;
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .form-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
        }
        .card-title {
            color: #2c3e50;
            font-weight: bold;
            margin-bottom: 30px;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }
        .btn-submit {
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <!-- Titre dynamique selon le contexte (Ajout ou Modification) -->
        <h2 class="card-title">
            <i th:class="${produit.id == null} ? 'bi bi-plus-circle' : 'bi bi-pencil-square'"></i>
            <span th:text="${produit.id == null} ? ' Ajouter un Produit' : ' Modifier le Produit'"></span>
        </h2>

        <!-- Formulaire lié à l'objet "produit" -->
        <form th:action="@{/produits/save}" th:object="${produit}" method="post">

            <!-- Champ caché pour l'ID (Indispensable pour la modification) -->
            <input type="hidden" th:field="*{id}" />

            <!-- Champ Nom -->
            <div class="mb-3">
                <label for="nom" class="form-label fw-bold">Désignation du Produit</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-box-seam"></i></span>
                    <input type="text" class="form-control" id="nom" th:field="*{nom}"
                           placeholder="Entrez le nom du produit" required>
                </div>
                <div class="form-text">Exemple : Smartphone, Ordinateur Portable, etc.</div>
            </div>

            <!-- Champ Prix -->
            <div class="mb-4">
                <label for="prix" class="form-label fw-bold">Prix de vente</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
                    <input type="number" step="0.01" class="form-control" id="prix" th:field="*{prix}"
                           placeholder="0.00" required>
                    <span class="input-group-text">DH</span>
                </div>
            </div>

            <!-- Boutons d'action -->
            <div class="d-flex justify-content-between align-items-center mt-4">
                <a th:href="@{/produits-web}" class="btn btn-outline-secondary">
                    <i class="bi bi-x-circle"></i> Annuler
                </a>

                <button type="submit" class="btn btn-primary btn-submit px-4">
                    <i class="bi bi-cloud-arrow-up"></i>
                    <span th:text="${produit.id == null} ? ' Créer le produit' : ' Enregistrer les modifications'"></span>
                </button>
            </div>
        </form>
    </div>

    <!-- Pied de page informatif -->
    <div class="text-center mt-4 text-muted">
        <small>FSTM - Système de Gestion d'Inventaire &copy; 2024</small>
    </div>
</div>

<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
